<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maura Gancitano — Filosofa, Scrittrice, Editrice</title>
<meta name="description" content="Sito ufficiale di Maura Gancitano. Filosofa, scrittrice, editrice. Co-fondatrice di Tlon. Autrice di Specchio delle mie brame, Liberati della brava bambina, Botanica della meraviglia e altri.">
<meta name="author" content="Maura Gancitano">
<meta property="og:title" content="Maura Gancitano">
<meta property="og:description" content="Filosofa, scrittrice, editrice. Co-fondatrice di Tlon.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mauragancitano.com">
<link rel="canonical" href="https://mauragancitano.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --salvia: #6b8f6b;
    --salvia-scuro: #4a6b4a;
    --salvia-chiaro: #8aab8a;
    --crema: #f8f6f2;
    --crema-calda: #f0ece4;
    --nero: #1a1a1a;
    --grigio: #6b6b6b;
    --bianco: #ffffff;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--crema);
    font-family: 'Inter', sans-serif;
    color: var(--nero);
    cursor: default;
}

canvas#garden {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
}

/* Portrait — left side */
.portrait-wrap {
    position: fixed;
    z-index: 10;
    left: clamp(2rem, 5vw, 5rem);
    bottom: 50%;
    transform: translateY(50%) scale(0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease 1.5s, transform 2s ease 1.5s;
}
.portrait-wrap.visible {
    opacity: 1;
    transform: translateY(50%) scale(1);
}
.portrait-ring {
    width: clamp(120px, 18vw, 200px);
    height: clamp(120px, 18vw, 200px);
    border-radius: 50%;
    border: 2px solid var(--salvia-chiaro);
    padding: 4px;
    background: radial-gradient(circle, rgba(248,246,242,0.9), rgba(248,246,242,0.4));
    box-shadow: 0 0 60px rgba(107,143,107,0.15), 0 0 120px rgba(107,143,107,0.05);
    position: relative;
}
.portrait-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
}
/* Placeholder when no photo */
.portrait-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--salvia-chiaro), var(--salvia-scuro));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--crema);
    letter-spacing: 0.05em;
}
/* Decorative ring pulse */
.portrait-ring::after {
    content: '';
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border-radius: 50%;
    border: 1px solid var(--salvia-chiaro);
    opacity: 0.3;
    animation: ringPulse 4s ease-in-out infinite;
}
@keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.04); opacity: 0.1; }
}

/* Identity — left side, below portrait */
.identity {
    position: fixed;
    z-index: 10;
    left: clamp(2rem, 5vw, 5rem);
    text-align: left;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease 2.5s;
}
.identity.visible { opacity: 1; }
.identity-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.5rem, 3vw, 2.4rem);
    color: var(--nero);
    letter-spacing: 0.02em;
    line-height: 1.1;
}
.identity-name em {
    font-style: italic;
    color: var(--salvia-scuro);
}
.identity-subtitle {
    margin-top: 0.4rem;
    font-size: clamp(0.65rem, 1.3vw, 0.8rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--grigio);
}

/* Floating labels on branches */
.branch-label {
    position: fixed;
    z-index: 20;
    pointer-events: auto;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.2s ease, transform 0.4s ease;
    text-decoration: none;
}
.branch-label.visible { opacity: 1; }
.branch-label:hover { transform: scale(1.08); }

.branch-label .label-text {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: var(--salvia-scuro);
    background: rgba(248, 246, 242, 0.85);
    backdrop-filter: blur(8px);
    padding: 0.4rem 0.8rem;
    border-radius: 2px;
    border-left: 2px solid var(--salvia);
    display: block;
    white-space: nowrap;
}
.branch-label .label-sub {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grigio);
    margin-top: 0.2rem;
    padding-left: 0.8rem;
    display: block;
}

/* Leaf tooltips on hover */
.leaf-tooltip {
    position: fixed;
    z-index: 30;
    background: rgba(248, 246, 242, 0.95);
    backdrop-filter: blur(12px);
    padding: 0.8rem 1rem;
    border-radius: 2px;
    border-left: 3px solid var(--salvia);
    max-width: 240px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-size: 0.78rem;
    line-height: 1.5;
    color: var(--nero);
}
.leaf-tooltip.visible { opacity: 1; }
.leaf-tooltip .tt-title {
    font-family: 'Instrument Serif', serif;
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
}
.leaf-tooltip .tt-year {
    font-weight: 500;
    color: var(--salvia);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
}

/* Intro hint */
.hint {
    position: fixed;
    z-index: 15;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--grigio);
    opacity: 0;
    transition: opacity 1.5s ease 5s;
}
.hint.visible { opacity: 0.6; }

/* Nav minimal */
.nav-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 2rem;
    opacity: 0;
    transition: opacity 1.5s ease 4s;
}
.nav-top.visible { opacity: 1; }
.nav-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1rem;
    color: var(--salvia-scuro);
    text-decoration: none;
    letter-spacing: 0.05em;
}
.nav-lang {
    display: flex;
    gap: 0.8rem;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}
.nav-lang a {
    color: var(--grigio);
    text-decoration: none;
    transition: color 0.3s;
}
.nav-lang a:hover, .nav-lang a.active { color: var(--salvia-scuro); }

/* Seasons hint */
@keyframes breathe {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
}
</style>
</head>
<body>

<canvas id="garden"></canvas>

<nav class="nav-top" id="navTop">
    <a href="index.html" class="nav-logo">MG</a>
    <div class="nav-lang">
        <a href="index.html" class="active">IT</a>
        <a href="en/index.html">EN</a>

<div class="portrait-wrap" id="portrait">
    <div class="portrait-ring">
        <!-- Sostituisci con: <img src="assets/images/maura-portrait.jpg" alt="Maura Gancitano"> -->
        <div class="portrait-placeholder">MG</div>
    </div>
</div>

<div class="identity" id="identity">
    <div class="identity-name">Maura <em>Gancitano</em></div>
    <div class="identity-subtitle">Filosofa &middot; Scrittrice &middot; Editrice</div>
</div>

<div class="hint" id="hint">Esplora i rami del pensiero</div>

<div class="leaf-tooltip" id="tooltip">
    <div class="tt-title"></div>
    <div class="tt-year"></div>
</div>

<script>
// ============================================================
// GIARDINO FILOSOFICO — Interactive Botanical Garden
// ============================================================

const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initGarden(); });

// Colors
const PALETTE = {
    trunk: [74, 107, 74],
    branch: [107, 143, 107],
    branchLight: [138, 171, 138],
    leaf: [107, 143, 107],
    leafLight: [158, 191, 148],
    flower: [180, 140, 160],
    flowerAlt: [170, 150, 130],
    bg: [248, 246, 242]
};

function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

// ============================================================
// Branch data — each main branch represents a section
// ============================================================
const SECTIONS = [
    {
        id: 'libri',
        label: 'Libri',
        sub: '12 opere pubblicate',
        angle: -Math.PI * 0.35,
        length: 0.22,
        href: 'libri.html',
        leaves: [
            { title: 'Specchio delle mie brame', year: '2024', angle: -0.4 },
            { title: 'Botanica della meraviglia', year: '2024', angle: 0.3 },
            { title: "L'erotica dei sentimenti", year: '2023', angle: -0.15 },
            { title: 'Liberati della brava bambina', year: '2020', angle: 0.45 },
            { title: 'Prendila con filosofia', year: '2021', angle: -0.5 },
            { title: 'Cosa succede sulla Terra?', year: '2024', angle: 0.5 },
        ]
    },
    {
        id: 'ricerca',
        label: 'Ricerca',
        sub: 'Filosofia contemporanea',
        angle: -Math.PI * 0.52,
        length: 0.20,
        href: 'ricerca.html',
        leaves: [
            { title: 'Bellezza e potere', year: 'tema', angle: -0.3 },
            { title: 'Corpo e libertà', year: 'tema', angle: 0.35 },
            { title: 'Filosofia digitale', year: 'tema', angle: -0.45 },
            { title: 'Mito e contemporaneità', year: 'tema', angle: 0.2 },
        ]
    },
    {
        id: 'traduzioni',
        label: 'Traduzioni',
        sub: '8 lingue nel mondo',
        angle: -Math.PI * 0.3,
        length: 0.18,
        href: 'libri.html#traduzioni',
        leaves: [
            { title: 'Spagnolo', year: 'Planeta', angle: -0.3 },
            { title: 'Tedesco', year: 'Goldmann', angle: 0.25 },
            { title: 'Cinese', year: '中文版', angle: 0.45 },
            { title: 'Coreano', year: '한국어', angle: -0.45 },
        ]
    },
    {
        id: 'podcast',
        label: 'Podcast',
        sub: '4 serie prodotte',
        angle: -Math.PI * 0.65,
        length: 0.20,
        href: 'podcast.html',
        leaves: [
            { title: 'Audible / Tlon', year: 'audio', angle: -0.35 },
            { title: 'Rai Radio 3', year: 'radio', angle: 0.3 },
            { title: 'Meraviglia', year: 'podcast', angle: -0.2 },
        ]
    },
    {
        id: 'contatti',
        label: 'Contatti',
        sub: 'Incontriamoci',
        angle: -Math.PI * 0.7,
        length: 0.16,
        href: 'contatti.html',
        leaves: [
            { title: 'Tlon', year: 'tlon.it', angle: -0.2 },
        ]
    }
];

// ============================================================
// Garden state
// ============================================================
let branches = [];
let leaves = [];
let growthProgress = 0;
let mouseX = W / 2, mouseY = H / 2;
let hoveredLeaf = null;
let startTime = 0;

class Branch {
    constructor(x, y, angle, length, depth, section, parentBranch) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.targetLength = length;
        this.currentLength = 0;
        this.depth = depth;
        this.section = section;
        this.parent = parentBranch;
        this.children = [];
        this.growStart = depth * 0.12 + Math.random() * 0.05;
        this.growEnd = this.growStart + 0.15 + depth * 0.05;
        this.thickness = Math.max(1, (5 - depth) * 1.8);
        this.swayOffset = Math.random() * Math.PI * 2;
        this.swayAmount = 0.008 + depth * 0.004;

        // endpoint
        this.endX = x + Math.cos(angle) * length;
        this.endY = y + Math.sin(angle) * length;
    }

    get progress() {
        if (growthProgress < this.growStart) return 0;
        if (growthProgress > this.growEnd) return 1;
        return (growthProgress - this.growStart) / (this.growEnd - this.growStart);
    }

    get currentEndX() {
        const sway = Math.sin(Date.now() * 0.0006 + this.swayOffset) * this.swayAmount * this.depth;
        const p = this.easeOut(this.progress);
        return this.x + Math.cos(this.angle + sway) * this.targetLength * p;
    }

    get currentEndY() {
        const sway = Math.sin(Date.now() * 0.0006 + this.swayOffset) * this.swayAmount * this.depth;
        const p = this.easeOut(this.progress);
        return this.y + Math.sin(this.angle + sway) * this.targetLength * p;
    }

    easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
    }

    draw(ctx, time) {
        const p = this.progress;
        if (p <= 0) return;

        const ex = this.currentEndX;
        const ey = this.currentEndY;

        // Wind response
        const wind = Math.sin(time * 0.0003 + this.x * 0.002) * 2 * this.depth;

        ctx.beginPath();
        ctx.moveTo(this.x, this.y);

        // Gentle curve
        const mx = (this.x + ex) / 2 + wind;
        const my = (this.y + ey) / 2 - this.targetLength * 0.1;
        ctx.quadraticCurveTo(mx, my, ex, ey);

        const alpha = Math.min(1, p * 1.5);
        const color = this.depth <= 1 ? PALETTE.trunk : (this.depth <= 2 ? PALETTE.branch : PALETTE.branchLight);
        ctx.strokeStyle = rgba(color, alpha * 0.8);
        ctx.lineWidth = this.thickness * p;
        ctx.lineCap = 'round';
        ctx.stroke();
    }
}

class Leaf {
    constructor(branch, data, angle) {
        this.branch = branch;
        this.data = data;
        this.relAngle = angle;
        this.size = 5 + Math.random() * 6;
        this.growDelay = branch.growEnd + 0.05 + Math.random() * 0.1;
        this.swayOffset = Math.random() * Math.PI * 2;
        this.isFlower = Math.random() > 0.6;
        this.hovered = false;
    }

    get x() {
        return this.branch.currentEndX + Math.cos(this.branch.angle + this.relAngle) * this.size * 2;
    }

    get y() {
        return this.branch.currentEndY + Math.sin(this.branch.angle + this.relAngle) * this.size * 2;
    }

    get visible() {
        return growthProgress > this.growDelay;
    }

    get alpha() {
        if (!this.visible) return 0;
        return Math.min(1, (growthProgress - this.growDelay) / 0.15);
    }

    draw(ctx, time) {
        if (!this.visible) return;
        const a = this.alpha;
        const sway = Math.sin(time * 0.001 + this.swayOffset) * 3;
        const x = this.x + sway;
        const y = this.y;
        const s = this.size * a;

        // Distance from mouse
        const dx = mouseX - x;
        const dy = mouseY - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hover = dist < 30;
        this.hovered = hover;

        if (hover) {
            hoveredLeaf = this;
        }

        const scale = hover ? 1.5 : 1;
        const finalSize = s * scale;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(this.branch.angle + this.relAngle + sway * 0.02);

        if (this.isFlower) {
            // Draw a small flower
            const color = hover ? PALETTE.flower : PALETTE.flowerAlt;
            for (let i = 0; i < 5; i++) {
                const pa = (i / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.ellipse(
                    Math.cos(pa) * finalSize * 0.5,
                    Math.sin(pa) * finalSize * 0.5,
                    finalSize * 0.4, finalSize * 0.25,
                    pa, 0, Math.PI * 2
                );
                ctx.fillStyle = rgba(color, a * (hover ? 0.9 : 0.5));
                ctx.fill();
            }
            // Center
            ctx.beginPath();
            ctx.arc(0, 0, finalSize * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = rgba(PALETTE.leafLight, a * 0.8);
            ctx.fill();
        } else {
            // Draw a leaf shape
            const color = hover ? PALETTE.leaf : PALETTE.leafLight;
            ctx.beginPath();
            ctx.ellipse(0, 0, finalSize * 0.7, finalSize * 0.35, 0, 0, Math.PI * 2);
            ctx.fillStyle = rgba(color, a * (hover ? 0.8 : 0.4));
            ctx.fill();

            // Vein
            ctx.beginPath();
            ctx.moveTo(-finalSize * 0.5, 0);
            ctx.lineTo(finalSize * 0.5, 0);
            ctx.strokeStyle = rgba(PALETTE.trunk, a * 0.2);
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        ctx.restore();
    }
}

// ============================================================
// Build garden
// ============================================================
function initGarden() {
    branches = [];
    leaves = [];

    const trunkX = W * 0.5;
    const trunkY = H + 20;
    const trunkLen = H * 0.45;
    const crownScale = Math.min(W, H);

    // ── Main trunk ──
    const trunk = new Branch(trunkX, trunkY, -Math.PI / 2, trunkLen, 0, null, null);
    trunk.thickness = 14;
    branches.push(trunk);

    // ── Primary fork — two main limbs ──
    const forkY = trunkY - trunkLen * 0.55;
    const limbL = new Branch(trunkX, forkY, -Math.PI * 0.38, trunkLen * 0.40, 1, null, trunk);
    const limbR = new Branch(trunkX, forkY, -Math.PI * 0.62, trunkLen * 0.40, 1, null, trunk);
    limbL.thickness = 9;
    limbR.thickness = 9;
    branches.push(limbL, limbR);

    // ── Secondary limbs — fill upper-left and upper-right ──
    const limbUpL = new Branch(trunkX, forkY - 15, -Math.PI * 0.30, trunkLen * 0.32, 1, null, trunk);
    const limbUpR = new Branch(trunkX, forkY - 15, -Math.PI * 0.70, trunkLen * 0.32, 1, null, trunk);
    const limbUp  = new Branch(trunkX, forkY - 10, -Math.PI * 0.50, trunkLen * 0.35, 1, null, trunk);
    limbUpL.thickness = 6; limbUpR.thickness = 6; limbUp.thickness = 7;
    branches.push(limbUpL, limbUpR, limbUp);

    // Collect all structural limbs
    const limbs = [limbL, limbR, limbUpL, limbUpR, limbUp];

    // ── Section branches on limbs ──
    const limbAssign = [limbUpL, limbUp, limbL, limbR, limbUpR];

    SECTIONS.forEach((section, i) => {
        const parent = limbAssign[i];
        const sx = parent.endX;
        const sy = parent.endY;
        const len = crownScale * section.length;

        const main = new Branch(sx, sy, section.angle, len, 2, section, parent);
        main.thickness = 4;
        branches.push(main);

        // Named leaves (books, themes, etc.)
        section.leaves.forEach(leafData => {
            const a = section.angle + leafData.angle * 0.5;
            const l = len * (0.4 + Math.random() * 0.25);
            const sb = new Branch(main.endX, main.endY, a, l, 3, section, main);
            branches.push(sb);
            leaves.push(new Leaf(sb, leafData, leafData.angle * 0.3));

            // Twigs on each named leaf
            for (let k = 0; k < 2; k++) {
                const ta = a + (Math.random() - 0.5) * 0.7;
                const tl = l * (0.3 + Math.random() * 0.25);
                const tb = new Branch(sb.endX, sb.endY, ta, tl, 4, section, sb);
                branches.push(tb);
                leaves.push(new Leaf(tb, null, (Math.random() - 0.5) * 0.5));
            }
        });

        // Fill branches along main
        for (let j = 0; j < 4; j++) {
            const t = (j + 1) / 5;
            const mx = sx + (main.endX - sx) * t;
            const my = sy + (main.endY - sy) * t;
            const fa = section.angle + (Math.random() - 0.5) * 0.6;
            const fl = len * (0.25 + Math.random() * 0.2);
            const fb = new Branch(mx, my, fa, fl, 3, section, main);
            branches.push(fb);
            leaves.push(new Leaf(fb, null, (Math.random() - 0.5) * 0.4));

            const ta = fa + (Math.random() - 0.5) * 0.5;
            const tl = fl * (0.35 + Math.random() * 0.25);
            const tb = new Branch(fb.endX, fb.endY, ta, tl, 4, section, fb);
            branches.push(tb);
            leaves.push(new Leaf(tb, null, (Math.random() - 0.5)));
        }
    });

    // ── Dense crown fill — many small branches radiating from limb ends ──
    // This creates the thick, overlapping canopy effect
    limbs.forEach(limb => {
        const cx = limb.endX;
        const cy = limb.endY;

        for (let r = 0; r < 12; r++) {
            // Radiate in a fan from each limb tip, upward bias
            const baseAngle = limb.angle;
            const spread = (r / 12) * Math.PI * 0.8 - Math.PI * 0.4;
            const a = baseAngle + spread;
            const l = crownScale * (0.06 + Math.random() * 0.10);
            const fb = new Branch(cx, cy, a, l, 3, null, limb);
            fb.thickness = 2;
            branches.push(fb);
            leaves.push(new Leaf(fb, null, spread * 0.3));

            // Second tier
            const a2 = a + (Math.random() - 0.5) * 0.5;
            const l2 = l * (0.4 + Math.random() * 0.3);
            const fb2 = new Branch(fb.endX, fb.endY, a2, l2, 4, null, fb);
            fb2.thickness = 1;
            branches.push(fb2);
            leaves.push(new Leaf(fb2, null, (Math.random() - 0.5) * 0.4));

            // Third tier — finest tips
            if (Math.random() > 0.3) {
                const a3 = a2 + (Math.random() - 0.5) * 0.4;
                const l3 = l2 * (0.3 + Math.random() * 0.3);
                const fb3 = new Branch(fb2.endX, fb2.endY, a3, l3, 5, null, fb2);
                fb3.thickness = 0.5;
                branches.push(fb3);
                leaves.push(new Leaf(fb3, null, (Math.random() - 0.5)));
            }
        }
    });

    // ── Additional crown fill from trunk fork ──
    for (let i = 0; i < 8; i++) {
        const a = -Math.PI * (0.25 + Math.random() * 0.5);
        const l = crownScale * (0.08 + Math.random() * 0.08);
        const fb = new Branch(trunkX, forkY - 5, a, l, 2, null, trunk);
        fb.thickness = 3;
        branches.push(fb);

        for (let j = 0; j < 3; j++) {
            const sa = a + (Math.random() - 0.5) * 0.6;
            const sl = l * (0.3 + Math.random() * 0.3);
            const sb = new Branch(fb.endX, fb.endY, sa, sl, 3, null, fb);
            branches.push(sb);
            leaves.push(new Leaf(sb, null, (Math.random() - 0.5) * 0.5));
        }
    }
}

// ============================================================
// Label positioning
// ============================================================
const labelElements = [];
function createLabels() {
    SECTIONS.forEach(section => {
        const el = document.createElement('a');
        el.className = 'branch-label';
        el.href = section.href;
        el.dataset.section = section.id;
        el.innerHTML = `<span class="label-text">${section.label}</span><span class="label-sub">${section.sub}</span>`;
        document.body.appendChild(el);
        labelElements.push({ el, section });
    });
}
createLabels();

function updateLabels() {
    labelElements.forEach(({ el, section }) => {
        // Find the main branch for this section
        const mainBranch = branches.find(b => b.section === section && b.depth === 2);
        if (!mainBranch) return;

        const p = mainBranch.progress;
        if (p > 0.5) {
            el.classList.add('visible');
            const x = mainBranch.currentEndX;
            const y = mainBranch.currentEndY;

            // Offset label away from center
            const offsetX = Math.cos(section.angle) * 30;
            const offsetY = Math.sin(section.angle) * 20 - 10;

            el.style.left = `${x + offsetX}px`;
            el.style.top = `${y + offsetY}px`;
        }
    });
}

// ============================================================
// Tooltip
// ============================================================
const tooltipEl = document.getElementById('tooltip');
const ttTitle = tooltipEl.querySelector('.tt-title');
const ttYear = tooltipEl.querySelector('.tt-year');

function updateTooltip() {
    if (hoveredLeaf && hoveredLeaf.data) {
        ttTitle.textContent = hoveredLeaf.data.title;
        ttYear.textContent = hoveredLeaf.data.year;
        tooltipEl.style.left = `${mouseX + 15}px`;
        tooltipEl.style.top = `${mouseY - 10}px`;
        tooltipEl.classList.add('visible');
    } else {
        tooltipEl.classList.remove('visible');
    }
}

// ============================================================
// Mouse tracking
// ============================================================
document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

// Click on leaf -> navigate
canvas.addEventListener('click', () => {
    if (hoveredLeaf && hoveredLeaf.branch.section) {
        const href = hoveredLeaf.branch.section.href;
        if (href) window.location.href = href;
    }
});

// ============================================================
// Particle system — floating spores
// ============================================================
class Spore {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * W;
        this.y = H + 10;
        this.size = 1 + Math.random() * 2;
        this.speedY = -0.2 - Math.random() * 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.alpha = 0.1 + Math.random() * 0.2;
        this.wobble = Math.random() * Math.PI * 2;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(Date.now() * 0.001 + this.wobble) * 0.2;
        if (this.y < -10) this.reset();
    }
    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = rgba(PALETTE.leafLight, this.alpha);
        ctx.fill();
    }
}

const spores = Array.from({ length: 60 }, () => new Spore());

// ============================================================
// Main loop
// ============================================================
initGarden();
startTime = Date.now();

function animate() {
    const time = Date.now();
    const elapsed = (time - startTime) / 1000;

    // Growth: 0 to 1 over ~6 seconds
    growthProgress = Math.min(1, elapsed / 6);

    // Clear
    ctx.fillStyle = rgba(PALETTE.bg, 1);
    ctx.fillRect(0, 0, W, H);

    // Subtle ground gradient
    const groundGrad = ctx.createLinearGradient(0, H * 0.85, 0, H);
    groundGrad.addColorStop(0, 'transparent');
    groundGrad.addColorStop(1, rgba(PALETTE.branchLight, 0.08));
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H * 0.85, W, H * 0.15);

    // Radial glow at trunk fork (behind the crown)
    const forkGlowY = (H + 20) - (H * 0.45) * 0.55;
    const glowAlpha = Math.min(0.12, growthProgress * 0.2);
    const glowRadius = Math.min(W, H) * 0.25;
    const glow = ctx.createRadialGradient(W * 0.5, forkGlowY, 0, W * 0.5, forkGlowY, glowRadius);
    glow.addColorStop(0, rgba(PALETTE.leafLight, glowAlpha));
    glow.addColorStop(0.5, rgba(PALETTE.branchLight, glowAlpha * 0.3));
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(W * 0.5 - glowRadius, forkGlowY - glowRadius, glowRadius * 2, glowRadius * 2);

    // Spores
    spores.forEach(s => { s.update(); s.draw(ctx); });

    // Draw branches
    hoveredLeaf = null;
    branches.forEach(b => b.draw(ctx, time));

    // Draw leaves
    leaves.forEach(l => l.draw(ctx, time));

    // Update labels
    updateLabels();

    // Tooltip
    updateTooltip();

    // Position identity below portrait (left side, CSS handles horizontal)
    const portraitEl = document.getElementById('portrait');
    const identityEl = document.getElementById('identity');
    const portraitRect = portraitEl.getBoundingClientRect();
    identityEl.style.bottom = `${H - portraitRect.bottom - 15}px`;

    // Show portrait early, identity slightly after
    if (growthProgress > 0.15) {
        portraitEl.classList.add('visible');
    }
    if (growthProgress > 0.3) {
        identityEl.classList.add('visible');
    }
    if (growthProgress > 0.5) {
        document.getElementById('hint').classList.add('visible');
        document.getElementById('navTop').classList.add('visible');
    }

    requestAnimationFrame(animate);
}

animate();
</script>
